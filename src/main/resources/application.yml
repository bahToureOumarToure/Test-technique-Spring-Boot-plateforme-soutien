spring:
  application:
    name: plateforme-soutien

  # ===== Connexion à PostgreSQL =====
  # Les vraies valeurs viennent des variables d'environnement (fichier .env,
  # injecté par docker-compose). La valeur après ":" n'est qu'un DÉFAUT pratique
  # pour lancer en local sans configurer quoi que ce soit. Aucun secret réel
  # n'est donc écrit en dur ici.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/soutien_db}
    username: ${SPRING_DATASOURCE_USERNAME:soutien}
    password: ${SPRING_DATASOURCE_PASSWORD:soutien}
    driver-class-name: org.postgresql.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      # update = Hibernate crée/met à jour les tables automatiquement
      # à partir de nos entités Java. Pratique pour un exercice.
      ddl-auto: update
    show-sql: true          # affiche les requêtes SQL dans la console
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ===== Configuration personnalisée pour JWT =====
# Le secret réel vient de la variable d'environnement APP_JWT_SECRET (.env).
# La valeur par défaut ci-dessous ne sert QUE pour le dev local.
app:
  jwt:
    # Clé secrète utilisée pour signer les tokens (au moins 32 caractères pour HS256)
    secret: ${APP_JWT_SECRET:DevSecretLocalUniquementChangeMoiEnProd0123456789}
    # Durée de validité d'un token : 24h (en millisecondes)
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

# ===== Documentation Swagger =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
